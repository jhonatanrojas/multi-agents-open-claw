<VirtualHost *:80>
    ServerName openclaw.deploymatrix.com

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass /api http://127.0.0.1:8001/api
    ProxyPassReverse /api http://127.0.0.1:8001/api

    ProxyPass /health http://127.0.0.1:8001/health
    ProxyPassReverse /health http://127.0.0.1:8001/health

    ProxyPass / http://127.0.0.1:8001/
    ProxyPassReverse / http://127.0.0.1:8001/

    ErrorLog ${APACHE_LOG_DIR}/openclaw-dashboard-error.log
    CustomLog ${APACHE_LOG_DIR}/openclaw-dashboard-access.log combined
</VirtualHost>
