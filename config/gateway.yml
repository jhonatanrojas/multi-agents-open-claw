## gateway.yml — Dev Squad Multi-Agent Config
## Place at: ~/.openclaw/gateway.yml
##
## ⚠️ NOTA IMPORTANTE: Los modelos se gestionan DINÁMICAMENTE via Dashboard API
## - Use PUT /api/models/agent para cambiar modelos
## - Los cambios persisten en ~/.openclaw/openclaw.json
## - Este archivo es SOLO de referencia para configuración de workspaces
##
## Modelos actuales (pueden diferir de la config dinámica):
## - ARCH: configurado dinámicamente
## - BYTE: configurado dinámicamente
## - PIXEL: configurado dinámicamente
## - JUDGE: configurado dinámicamente
##
## Para ver modelos actuales: GET /api/models
## Para cambiar: PUT /api/models/agent {"agent_id": "byte", "model": "xiaomi/mimo-v2-pro"}

agents:
  list:
    - id: "arch"
      name: "ARCH - Coordinator"
      workspace: "./workspaces/coordinator"
      # Model managed dynamically via Dashboard API
      agentDir: "~/.openclaw/agents/arch"

    - id: "byte"
      name: "BYTE - Programmer"
      workspace: "./workspaces/programmer"
      # Model managed dynamically via Dashboard API
      agentDir: "~/.openclaw/agents/byte"
      tools:
        exec:
          allow:
            - "cloudflared tunnel --url"
            - "npx serve"
            - "npm run dev"

    - id: "pixel"
      name: "PIXEL - Designer"
      workspace: "./workspaces/designer"
      # Model managed dynamically via Dashboard API
      agentDir: "~/.openclaw/agents/pixel"

    - id: "judge"
      name: "JUDGE - Reviewer"
      workspace: "./workspaces/reviewer"
      # Model managed dynamically via Dashboard API
      agentDir: "~/.openclaw/agents/judge"

## Shared memory - all agents mount the same directory
sharedMemory:
  enabled: true
  path: "./shared"

## Skills available to ALL agents
skills:
  shared:
    - path: "~/.openclaw/skills/fs-read"
    - path: "~/.openclaw/skills/fs-write"
    - path: "~/.openclaw/skills/code-exec"
    - path: "./skills/stack-router"
    - path: "./skills/miniverse-bridge"

## Environment variable overrides (optional)
## These can override dynamic settings if needed:
# - ARCH_MODEL=nvidia/z-ai/glm5
# - BYTE_MODEL=xiaomi/mimo-v2-pro
# - PIXEL_MODEL=deepseek/deepseek-chat
