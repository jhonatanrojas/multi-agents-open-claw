## gateway.yml — Dev Squad Multi-Agent Config
## Place at: ~/.openclaw/gateway.yml
## Model overrides: set ARCH_MODEL / BYTE_MODEL / PIXEL_MODEL env vars,
## or use PUT /api/models on the dashboard to update models_config.json.

agents:
  list:
    - id: "arch"
      name: "ARCH — Coordinator"
      workspace: "./workspaces/coordinator"
      model: "nvidia/z-ai/glm5"          # override: ARCH_MODEL env var
      agentDir: "~/.openclaw/agents/arch"

    - id: "byte"
      name: "BYTE — Programmer"
      workspace: "./workspaces/programmer"
      model: "nvidia/moonshotai/kimi-k2.5"   # fallback: deepseek/deepseek-chat
      agentDir: "~/.openclaw/agents/byte"

    - id: "pixel"
      name: "PIXEL — Designer"
      workspace: "./workspaces/designer"
      model: "deepseek/deepseek-chat"
      agentDir: "~/.openclaw/agents/pixel"

## Shared memory — all agents mount the same directory
sharedMemory:
  enabled: true
  path: "./shared"           # All agents read/write shared/MEMORY.json

## Skills available to ALL agents
skills:
  shared:
    - path: "~/.openclaw/skills/fs-read"       # read files
    - path: "~/.openclaw/skills/fs-write"      # write files
    - path: "~/.openclaw/skills/code-exec"     # run code snippets
    - path: "./skills/stack-router"            # stack-aware skill routing
    - path: "./skills/miniverse-bridge"        # Miniverse heartbeat skill

## Channels (optional)
# channels:
#   slack:
#     token: "${SLACK_BOT_TOKEN}"
